<!DOCTYPE html>
<html>

<head>
    <title>Add Tenant</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: white;
            transform: perspective(1000px) rotateX(3deg);
            transition: 0.3s;
        }

        .container:hover {
            transform: perspective(1000px) rotateX(0deg) scale(1.03);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        select {
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            color: white;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Add Tenant</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="name" placeholder="Tenant Name" required>

            <input type="text" name="phone" placeholder="Phone Number" required>

            <select name="hostel">
                <option disabled selected>Select Hostel</option>

                {% for hostel in hostels %}

                <option value="{{ hostel.id }}">{{ hostel.name }}</option>

                {% endfor %}

            </select>

            <input type="number" name="room" placeholder="Room Number">

            <button type="submit">Add Tenant</button>

        </form>

    </div>

</body>

</html>
